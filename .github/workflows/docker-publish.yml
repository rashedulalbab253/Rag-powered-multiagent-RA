name: 🐳 Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  IMAGE_NAME: rashedulalbab1234/rag-research-assistant

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ───────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (multi-platform builds, caching) ─────────
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to Docker Hub ──────────────────────────────────────────
      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Extract metadata (tags & labels) ──────────────────────────────
      - name: 🏷️  Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── 5. Build & push ──────────────────────────────────────────────────
      - name: 🏗️  Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Print image digest ─────────────────────────────────────────────
      - name: ✅ Image pushed successfully
        run: |
          echo "🎉 Docker image pushed!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags : ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Pull it with:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Run it locally:"
          echo "  docker run -p 8000:8000 --env-file .env ${{ env.IMAGE_NAME }}:latest"
