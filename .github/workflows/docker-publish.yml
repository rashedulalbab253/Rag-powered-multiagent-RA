name: 🐳 Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: rashedulalbab1234/rag-research-assistant

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Free disk space (GH runner has ~14 GB free by default) ─────────
      - name: 🧹 Free disk space
        run: |
          echo "Disk before:" && df -h /
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo apt-get clean -y
          echo "Disk after:" && df -h /

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────
      - name: 🔑 Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ── 4. Build with BuildKit DISABLED (fixes rpc/EOF crash) ─────────────
      #     DOCKER_BUILDKIT=0 uses the classic builder which has no gRPC layer
      - name: 🏗️  Build Docker image
        env:
          DOCKER_BUILDKIT: "0"          # ← key fix: disables BuildKit gRPC daemon
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .

      # ── 5. Push ───────────────────────────────────────────────────────────
      - name: 📤 Push to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      # ── 6. Summary ────────────────────────────────────────────────────────
      - name: ✅ Done
        if: github.event_name != 'pull_request'
        run: |
          echo "🎉 Image pushed to Docker Hub!"
          echo "Pull:  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo "Run:   docker run -p 8000:8000 --env-file .env ${{ env.IMAGE_NAME }}:latest"
