name: 🐳 Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: rashedulalbab1234/rag-research-assistant

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx with the DEFAULT docker driver ───────────
      #     (avoids the EOF / rpc error caused by docker-container driver
      #      running out of memory on heavy installs like crewai + chromadb)
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker          # ← key fix: use standard docker driver

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────
      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Extract image tags ─────────────────────────────────────────────
      - name: 🏷️  Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── 5. Build & push ───────────────────────────────────────────────────
      - name: 🏗️  Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NOTE: GHA cache is disabled intentionally — it conflicts with
          # the docker driver (only works with docker-container driver).
          # Layer caching still works via Docker's own layer reuse.

      # ── 6. Summary ────────────────────────────────────────────────────────
      - name: ✅ Done
        run: |
          echo "🎉 Image pushed to Docker Hub!"
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Run with:"
          echo "  docker run -p 8000:8000 --env-file .env ${{ env.IMAGE_NAME }}:latest"
