name: 🐳 Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: rashedulalbab1234/rag-research-assistant

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Log in to Docker Hub ───────────────────────────────────────────
      - name: 🔑 Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ── 3. Build image (plain docker CLI — no buildx, avoids EOF bug) ─────
      - name: 🏗️  Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .

      # ── 4. Push (only on push to main, not on PRs) ────────────────────────
      - name: 📤 Push to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      # ── 5. Summary ────────────────────────────────────────────────────────
      - name: ✅ Done
        if: github.event_name != 'pull_request'
        run: |
          echo "🎉 Successfully pushed to Docker Hub!"
          echo ""
          echo "Pull:  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo "Run:   docker run -p 8000:8000 --env-file .env ${{ env.IMAGE_NAME }}:latest"
